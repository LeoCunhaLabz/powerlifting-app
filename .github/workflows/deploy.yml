name: Deploy

# Pipeline de produção: roda em todo push para `main`.
# Fluxo: build (gate) -> deploy via API do Dokploy -> smoke test -> e-mail.
# Como o deploy só é disparado APÓS o build passar, código quebrado nunca sobe.
# Pré-requisito: desligue o auto-deploy do Dokploy para evitar deploy duplicado.
on:
  push:
    branches: ["main"]

# Garante um deploy por vez (não cancela o que já está rodando).
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # 1) Gate: lint + build (type-check). Se falhar, o deploy não acontece.
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm run test

      - name: Build (type-check + bundle)
        run: npm run build

  # 2) Deploy: dispara o build/deploy no Dokploy via API REST com API key.
  deploy:
    name: Deploy no Dokploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verificar conectividade com Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
        run: |
          echo "Testando conectividade básica com Dokploy..."
          # Extrai host e porta
          HOST=$(echo "$DOKPLOY_URL" | sed -E 's|https?://([^:/]+).*|\1|')
          PORT=$(echo "$DOKPLOY_URL" | sed -E 's|.*:([0-9]+).*|\1|; s|[^0-9]||g') 
          PORT=${PORT:-3000}
          echo "Host: $HOST, Porta: $PORT"
          
          # Tenta um TCP handshake simples
          timeout 10 bash -c "cat </dev/null >/dev/tcp/$HOST/$PORT" && echo "TCP OK" || echo "TCP falhou (pode ser esperado se firewall bloqueia)"

      - name: Disparar deploy no Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
        run: |
          FULL_URL="${DOKPLOY_URL}/api/application.deploy"
          echo "URL: $FULL_URL"
          echo "APP_ID: $DOKPLOY_APP_ID"
          echo "API_KEY definida: $([ -n "$DOKPLOY_API_KEY" ] && echo 'SIM' || echo 'NAO')"

          # Aumenta timeouts e reduz retries para evitar timeout total muito longo
          http_code=$(curl -sS -o /tmp/dokploy_response.json -w "%{http_code}" \
            --connect-timeout 30 --max-time 120 \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -X POST "$FULL_URL" \
            -H 'accept: application/json' \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "{\"applicationId\": \"$DOKPLOY_APP_ID\"}")
          
          echo "HTTP $http_code"
          echo "Resposta:"
          cat /tmp/dokploy_response.json || true
          
          # Tolera timeout (28) como transiente, deixa o smoke test retentar
          if [ "$http_code" = "28" ]; then
            echo "::warning::Timeout ao chamar Dokploy. Smoke test fará retry."
            exit 0
          fi
          
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Falha ao disparar o deploy no Dokploy (HTTP $http_code)"
            exit 1
          fi
          echo "Deploy disparado com sucesso."

  # 3) Smoke test: confirma que a nova versão está no ar (HTTP 200).
  verify:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.healthcheck.outputs.status }}
    steps:
      - name: Aguardar e verificar a aplicação
        id: healthcheck
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "Verificando $APP_URL (o deploy do Dokploy é assíncrono)..."
          # Dá tempo inicial para o Dokploy fazer build/rollout e cert SSL.
          # Se houve timeout prévio, aguarda mais tempo.
          echo "Aguardando 90 segundos..."
          sleep 90
          
          attempts=30
          for i in $(seq 1 $attempts); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$APP_URL" || echo "000")
            echo "Tentativa $i/$attempts -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "status=ok" >> "$GITHUB_OUTPUT"
              echo "Aplicação respondeu 200. Nova versão no ar."
              exit 0
            fi
            sleep 10
          done
          
          echo "status=fail" >> "$GITHUB_OUTPUT"
          echo "::error::A aplicação não respondeu 200 após o deploy."
          exit 1

  # 4) E-mail: resumo do pipeline. Roda sempre (sucesso ou falha).
  notify:
    name: E-mail de resumo
    needs: [build, deploy, verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Montar resumo
        id: summary
        run: |
          build="${{ needs.build.result }}"
          deploy="${{ needs.deploy.result }}"
          verify="${{ needs.verify.result }}"
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚠️";; esac; }
          if [ "$build" = "success" ] && [ "$deploy" = "success" ] && [ "$verify" = "success" ]; then
            overall="✅ SUCESSO — nova versão no ar"
          else
            overall="❌ FALHA — verifique o pipeline"
          fi
          {
            echo "subject=[Powerlifting App] Deploy ${overall}"
            echo "overall=${overall}"
            echo "build_icon=$(icon "$build")"
            echo "deploy_icon=$(icon "$deploy")"
            echo "verify_icon=$(icon "$verify")"
          } >> "$GITHUB_OUTPUT"

      - name: Enviar e-mail (Resend)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          SUBJECT="${{ steps.summary.outputs.subject }}"
          HTML="<h2>${{ steps.summary.outputs.overall }}</h2><p><b>Repo:</b> ${{ github.repository }}<br/><b>Branch:</b> ${{ github.ref_name }}<br/><b>Commit:</b> ${{ github.sha }}<br/><b>Autor:</b> ${{ github.actor }}</p><h3>Etapas</h3><ul><li>${{ steps.summary.outputs.build_icon }} Lint, Testes &amp; Build</li><li>${{ steps.summary.outputs.deploy_icon }} Deploy no Dokploy</li><li>${{ steps.summary.outputs.verify_icon }} Smoke test (app no ar)</li></ul><p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver logs no GitHub Actions</a></p>"

          PAYLOAD=$(jq -n \
            --arg from "Powerlifting CI <onboarding@resend.dev>" \
            --arg to "$MAIL_TO" \
            --arg subject "$SUBJECT" \
            --arg html "$HTML" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          http_code=$(curl -sS -o /tmp/resend_response.json -w "%{http_code}" \
            -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
          echo "Resend HTTP $http_code"
          cat /tmp/resend_response.json || true
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::warning::Falha ao enviar e-mail via Resend (HTTP $http_code), mas o deploy foi realizado."
          fi
