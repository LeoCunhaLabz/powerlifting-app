name: CI

# Gate de qualidade para Pull Requests: garante que lint e build (type-check
# incluso) passem antes do merge na `main`. O deploy (push na main) é validado
# pelo workflow `deploy.yml`, que reexecuta o mesmo gate antes de subir.
on:
  pull_request:
    branches: ["main"]

# Cancela execuções antigas do mesmo branch/PR quando há um novo push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm run test

      - name: Build (type-check + bundle)
        run: npm run build
