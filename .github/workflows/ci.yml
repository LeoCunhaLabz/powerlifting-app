name: CI

# Gate de qualidade para Pull Requests: garante que lint, testes e build
# (type-check incluso) do web e da API passem antes do merge na `main`.
# O deploy (push na main) é validado pelo workflow `deploy.yml`, que reexecuta
# o mesmo gate antes de subir.
on:
  pull_request:
    branches: ["main"]

# Cancela execuções antigas do mesmo branch/PR quando há um novo push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Lint, Testes & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Lint (web)
        run: npm run lint

      - name: Lint (API)
        run: npm run lint:api

      - name: Testes (web)
        run: npm run test

      - name: Testes (API)
        run: npm run test:api

      - name: Build (web)
        run: npm run build

      - name: Build (API)
        run: npm run build:api
