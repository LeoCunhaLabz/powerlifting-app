server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Headers de segurança globais (herdados por location / sem add_header próprio)
    add_header X-Content-Type-Options      "nosniff"                            always;
    add_header X-Frame-Options             "DENY"                               always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
    # HSTS: nginx fica atrás do Traefik TLS em produção; ignorado por browsers em HTTP dev
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; worker-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;

    # PWA: service worker e manifest — sem cache para detectar atualizações
    location ~* (sw\.js|workbox-[^.]+\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Content-Type-Options      "nosniff"                            always;
        add_header X-Frame-Options             "DENY"                               always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; worker-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    }

    location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        add_header X-Content-Type-Options      "nosniff"                            always;
        add_header X-Frame-Options             "DENY"                               always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; worker-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Content-Type-Options      "nosniff"                            always;
        add_header X-Frame-Options             "DENY"                               always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; worker-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
